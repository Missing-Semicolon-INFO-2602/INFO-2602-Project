<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Page</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>

<body>

<div class="page">

  <!-- TOP PROFILE BAR -->
  <div class="profile-header">
    User profile
  </div>

  <!-- COLLECTED ANIMALS SECTION -->
  <div class="collection-container">

    <h2 class="section-title">Collected Animals</h2>

    <form method="get" class="search-form">
      <input type="text" name="q" value="{{ q or '' }}" placeholder="Search by name or species">
      <button type="submit">Search</button>
    </form>

    <div class="animal-grid">

      {% for animal in animals %}

      <div class="animal-card">
        <div class="animal-image">
          {% if animal.pic %}<img src="{{ animal.pic }}" alt="{{ animal.common_name }}">{% endif %}
        </div>
        <div class="animal-name">
          {{ animal.common_name }}
        </div>
      </div>

      {% endfor %}

      <a href="/">
        <button>Back</button>
      </a>

    </div>

    <h2 class="section-title">Animal Map</h2>
    <div id="tree"></div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="/static/js/tree.js" defer></script>

</body>
</html>
