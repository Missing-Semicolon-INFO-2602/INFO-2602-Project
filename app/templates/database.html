<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal Database</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>

<body>

<div class="page">

  <div class="profile-header">
    Animal Database
  </div>

  <div class="collection-container">

    <h2 class="section-title">All Known Animals</h2>

    <form method="get" class="search-form">
      <input type="text" name="q" value="{{ q or '' }}" placeholder="Search by name or species">
      <button type="submit">Search</button>
    </form>

    <div class="animal-grid">

      {% for animal in animals %}
      <div class="animal-card">
        <div class="animal-image">
          {% if animal.pic %}<img src="{{ animal.pic }}" alt="{{ animal.common_name }}">{% endif %}
        </div>
        <div class="animal-name">
          {{ animal.common_name }}
        </div>
      </div>
      {% endfor %}

    </div>

    <a href="/">
      <button>Back</button>
    </a>

  </div>

</div>

</body>
</html>
