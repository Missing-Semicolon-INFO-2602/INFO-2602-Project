<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Page</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>

<body>

<div class="page">

  <div class="sidebar">
    <h2>Leaderboard</h2>
  </div>

  <div class="main-content">
    <ol class="leaderboard-list">
      {% for u in users %}
      <li>{{ u.username }} &mdash; {{ u.weekly_points }}</li>
      {% endfor %}
    </ol>
  </div>

</div>

</body>
</html>
