<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scan Animal</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>

  <!-- Outer container -->
  <div class="page">

    <!-- Logo -->
    <div class="logo">&lt;LOGO&gt;</div>

    <!-- Title -->
    <h1>Scan Animal</h1>

    <div id="drop-zone" class="drop-zone">
      <p>Drop an image here or click to pick</p>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>

    <div id="status" class="status"></div>

    <div id="result" class="profile-card" hidden>
      <img id="result-pic" class="profile-pic" alt="">
      <div id="result-name" class="user-level"></div>
    </div>

    <!-- Buttons -->
    <div class="menu">

  <a href="/">
    <button>Back</button>
  </a>

  <a href="/collection">
    <button>Collection</button>
  </a>

</div>

  </div>

  <script src="/static/js/upload.js" defer></script>

</body>
</html>
